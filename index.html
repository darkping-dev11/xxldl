<style>  

/* PEMBE ARKA PLAN */

html, body {  
min-height: 100%;  
background: linear-gradient(135deg, #ff4da6, #ff6bb5, #ff85c2, #ff4da6) !important;  
background-size: 400% 400%;  
animation: gradientMove 18s ease infinite;  
background-attachment: fixed;  
}  

@keyframes gradientMove {  
0% { background-position: 0% 50%; }  
50% { background-position: 100% 50%; }  
100% { background-position: 0% 50%; }  
}  

/* TÜM YAZILAR BEYAZ */

body,  
h1,h2,h3,h4,h5,h6,  
p,  
span,  
a,  
td,  
th {  
color:#ffffff !important;  
}  

/* List kutularını kaldır */

li,  
.list__item,  
.record {  
background: transparent !important;  
box-shadow: none !important;  
border: none !important;  
}  

/* Beyaz arka planları transparan yap */  
body > *,  
#app,  
main,  
section,  
div {  
background-color: transparent !important;  
}  

/* Header çizgileri */  

header .logo {  
border-bottom: 2px solid rgba(255,255,255,0.3);  
padding-bottom: 10px;  
margin-bottom: 10px;  
}  

header .nav {  
border-bottom: 1px solid rgba(255,255,255,0.2);  
}  

/* Submit Record çizgi efekti */

.nav__cta {  
border-bottom: 2px solid transparent;  
transition: border-color 0.3s ease;  
}  

.nav__cta:hover {  
border-bottom: 2px solid #fff;  
}  

/* Dropdown menü */

.nav-dropdown {  
position: relative;  
display: inline-block;  
}  

/* MENÜ ARKASI BEYAZ */

.dropdown-content {  
display: none;  
position: absolute;  
right: 0;  
background-color: #ffffff;  
min-width: 140px;  
border-radius: 0.5rem;  
overflow: hidden;  
box-shadow: 0 4px 8px rgba(0,0,0,0.3);  
z-index: 100;  
}  

.dropdown-content a {  
display: block;  
padding: 0.5rem 1rem;  
color: #000 !important;  
text-decoration: none;  
font-size: 0.9rem;  
}  

.dropdown-content a:hover {  
background-color: #f2f2f2;  
}  

.nav-dropdown:hover .dropdown-content {  
display: block;  
}  

.dropdown-btn {  
background: transparent;  
border: none;  
font-size: 1.5rem;  
cursor: pointer;  
color: #fff;  
}  

</style>  

<script src="https://unpkg.com/vue@3.2.31/dist/vue.global.js"></script>  
<script src="https://unpkg.com/vue-router@4.0.14/dist/vue-router.global.prod.js"></script>  
<script type="module" src="/js/main.js"></script>  

</head>  

<body id="app">  

<header>  

<div class="logo">

</div>

<span class="type-label-lg">List</span>  
</router-link>  

<router-link class="nav__tab" to="/leaderboard">  
<span class="type-label-lg">Leaderboard</span>  
</router-link>  

<router-link class="nav__tab" to="/roulette">  
<span class="type-label-lg">Roulette</span>  
</router-link>  

<div class="nav__actions">  

<div class="nav-dropdown">  
<button class="nav__icon dropdown-btn">🌐</button>  

<div class="dropdown-content">  
<a href="https://discord.com" target="_blank">Discord</a>  
<a href="https://youtube.com" target="_blank">YouTube</a>  
<a href="https://twitter.com" target="_blank">Twitter</a>  
</div>  

</div>  

<a class="nav__cta type-label-lg" href="#" target="_blank">  
Submit Record  
</a>  

</div>  

</nav>  
</header>  

<router-view></router-view>  

</body>
