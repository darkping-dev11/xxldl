<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1024" />
    <title>XXL Demon List</title>

    <link rel="icon" href="/list_icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@500;700&display=swap" rel="stylesheet"/>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/reset.css"/>
    <link rel="stylesheet" href="/css/typography.css"/>
    <link rel="stylesheet" href="/css/main.css"/>
    <link rel="stylesheet" href="/css/pages/list.css"/>
    <link rel="stylesheet" href="/css/pages/leaderboard.css"/>
    <link rel="stylesheet" href="/css/pages/roulette.css"/>
    <link rel="stylesheet" href="/css/components/nav.css"/>
    <link rel="stylesheet" href="/css/components/btn.css"/>
    <link rel="stylesheet" href="/css/components/tabs.css"/>
    <link rel="stylesheet" href="/css/pages/auth.css"/> <!-- Register/Login için -->

    <!-- Vue -->
    <script src="https://unpkg.com/vue@3.2.31/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4.0.14/dist/vue-router.global.prod.js"></script>
    <script type="module" src="/js/main.js"></script>
</head>
<body id="app">
    <header :class="{ dark: store.dark }">
        <div class="logo">
            <h2>XXL DL</h2>
            <p>v1.0.0</p>
        </div>
        <nav class="nav">
            <router-link class="nav__tab" to="/">😈│List</router-link>
            <router-link class="nav__tab" to="/leaderboard">🏆│Leaderboard</router-link>
            <router-link class="nav__tab" to="/roulette">🎲│Roulette</router-link>
            <div class="nav__actions">
                <button class="nav__icon" @click.prevent="store.toggleDark()">
                    <img :src="store.dark ? '/assets/light.svg' : '/assets/dark.svg'" alt=""/>
                </button>
                <a class="nav__icon" href="#"><img src="/assets/discord.svg" alt="Discord Logo"/></a>

                <!-- Submit Record -->
                <router-link class="nav__cta type-label-lg" to="/submit">Submit Record</router-link>

                <!-- Register & Login Butonları -->
                <router-link class="nav__cta type-label-lg" to="/register">Register</router-link>
                <router-link class="nav__cta type-label-lg" to="/login">Login</router-link>
            </div>
        </nav>
    </header>

    <!-- Vue Router ile sayfalar buraya yüklenir -->
    <router-view :class="{ dark: store.dark }"></router-view>
</body>
</html>
