<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1024" />
<title>Your List Name</title>
<link rel="icon" href="/listt_icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@500;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" type="text/css" href="/css/reset.css" />
<link rel="stylesheet" type="text/css" href="/css/typography.css" />
<link rel="stylesheet" type="text/css" href="/css/main.css" />
<link rel="stylesheet" type="text/css" href="/css/pages/list.css" />
<link rel="stylesheet" type="text/css" href="/css/pages/leaderboard.css" />
<link rel="stylesheet" type="text/css" href="/css/pages/roulette.css" />
<link rel="stylesheet" type="text/css" href="/css/components/nav.css" />
<link rel="stylesheet" type="text/css" href="/css/components/btn.css" />
<link rel="stylesheet" type="text/css" href="/css/components/tabs.css" />

<style>
html, body {
    min-height: 100%;
    background: linear-gradient(135deg, #ff0080, #ff66cc, #ff99cc, #ffb3e6);
    background-size: 400% 400%;
    animation: gradientMove 18s ease infinite;
    background-attachment: fixed;
    color: #fff;
    font-family: 'Lexend Deca', sans-serif;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

body > *, #app, main, section, div {
    background-color: transparent !important;
    color: #fff !important;
}

/* XXL DL font */
header .logo h2 {
    font-family: 'Lexend Deca', sans-serif;
    font-weight: 700;
    margin: 0;
}

header .logo {
    border-bottom: 2px solid rgba(255,255,255,0.3);
    padding-bottom: 10px;
    margin-bottom: 10px;
}

header .nav {
    border-bottom: 2px solid #fff; /* Daha belirgin */
}

.nav__tab span {
    border-bottom: 2px solid transparent;
    transition: border-color 0.3s ease;
    padding-bottom: 2px;
}

.nav__tab span.router-link-active {
    border-bottom: 2px solid #fff;
}

.nav__cta {
    border-bottom: 2px solid #fff; /* Daha belirgin */
    transition: border-color 0.3s ease;
}

.nav__cta:hover {
    border-bottom: 3px solid #fff;
}

/* Dropdown menü */
.nav-dropdown {
    position: relative;
    display: inline-block;
}

.dropdown-content {
    display: none;
    position: absolute;
    right: 0;
    background-color: #fff;
    min-width: 140px;
    border-radius: 0.5rem;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    z-index: 100;
}

.dropdown-content a {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 1rem;
    color: #000;
    text-decoration: none;
    font-size: 0.9rem;
}

.dropdown-content a:hover {
    background-color: rgba(0,0,0,0.05);
}

.nav-dropdown:hover .dropdown-content {
    display: block;
}

.dropdown-btn {
    background: transparent;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: #fff;
}

/* Level listesi arka plan kaldırıldı */
.level-name {
    background: none !important;
    color: #fff !important;
}

/* Leaderboard çizgiler */
.page-leaderboard .board {
    border-collapse: collapse;
    width: 100%;
}

.page-leaderboard .board th,
.page-leaderboard .board td {
    padding: 0.5rem 0.75rem;
}

.page-leaderboard .board th {
    border-bottom: 2px solid rgba(255,255,255,0.3);
}

.page-leaderboard .board th + th,
.page-leaderboard .board td + td {
    border-left: 1px solid rgba(255,255,255,0.3);
}
</style>

<script src="https://unpkg.com/vue@3.2.31/dist/vue.global.js"></script>
<script src="https://unpkg.com/vue-router@4.0.14/dist/vue-router.global.prod.js"></script>
<script type="module" src="/js/main.js"></script>
</head>

<body id="app">
<header>
    <div class="logo">
        <h2>XXL DL</h2>
        <p>v1.0.0</p>
    </div>
    <nav class="nav">
        <router-link class="nav__tab" to="/">
            <span class="type-label-lg">List</span>
        </router-link>
        <router-link class="nav__tab" to="/leaderboard">
            <span class="type-label-lg">Leaderboard</span>
        </router-link>
        <router-link class="nav__tab" to="/roulette">
            <span class="type-label-lg">Roulette</span>
        </router-link>

        <div class="nav__actions">
            <div class="nav-dropdown">
                <button class="nav__icon dropdown-btn">🌐</button>
                <div class="dropdown-content">
                    <a href="https://discord.com" target="_blank">🔵 Discord</a>
                    <a href="https://youtube.com" target="_blank">📽 YouTube</a>
                    <a href="https://twitter.com" target="_blank">🐦 Twitter</a>
                </div>
            </div>

            <a class="nav__cta type-label-lg" href="#" target="_blank">Submit Record</a>
        </div>
    </nav>
</header>

<router-view></router-view>
</body>
</html>
