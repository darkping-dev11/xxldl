<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1024" />
    <title>XXL Demon List</title>

    <!-- Replace your server icon by uploading an image file named "list_icon.png"-->
    <link rel="icon" href="/list_icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@500;700&display=swap"
        rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="/css/reset.css" />
    <link rel="stylesheet" type="text/css" href="/css/typography.css" />
    <link rel="stylesheet" type="text/css" href="/css/main.css" />
    <link rel="stylesheet" type="text/css" href="/css/pages/list.css" />
    <link rel="stylesheet" type="text/css" href="/css/pages/leaderboard.css" />
    <link rel="stylesheet" type="text/css" href="/css/pages/roulette.css" />
    <link rel="stylesheet" type="text/css" href="/css/components/nav.css" />
    <link rel="stylesheet" type="text/css" href="/css/components/btn.css" />
    <link rel="stylesheet" type="text/css" href="/css/components/tabs.css" />
    <script src="https://unpkg.com/vue@3.2.31/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4.0.14/dist/vue-router.global.prod.js"></script>
    <script type="module" src="/js/main.js"></script>
</head>
<body id="app">
    <header :class="{ dark: store.dark }">
        <div class="logo">
            <h2>XXL DL</h2>
            <p>v1.0.0</p>
        </div>
        <nav class="nav">
            <router-link class="nav__tab" to="/">
                <span class="type-label-lg">😈│List</span>
            </router-link>
            <router-link class="nav__tab" to="/leaderboard">
                <span class="type-label-lg">🏆│Leaderboard</span>
            </router-link>
            <router-link class="nav__tab" to="/roulette">
                <span class="type-label-lg">🎲│Roulette</span>
            </router-link>
            <div class="nav__actions">
                <button class="nav__icon" @click.prevent="store.toggleDark()">
                    <img
                        :src="store.dark ? '/assets/light.svg' : '/assets/dark.svg'"
                        alt=""
                    />
                </button>
                <a class="nav__icon" href="#">
                    <img src="/assets/discord.svg" alt="Discord Logo" />
                </a>

                <!-- Submit Record -->
                <router-link class="nav__cta type-label-lg" to="/submit">
                    Submit Record
                </router-link>

                <!-- Register & Login Butonları -->
                <button id="registerBtn" class="nav__cta type-label-lg">Register</button>
                <button id="loginBtn" class="nav__cta type-label-lg">Login</button>

            </div>
        </nav>
    </header>

    <!-- Auth Modal (Register & Login) -->
    <div id="authModal" class="hidden">
        <div class="modal-content">
            <span id="closeModal">&times;</span>

            <!-- Register Form -->
            <div id="registerForm" class="hidden">
                <h2>Register</h2>
                <form id="registerFormElement">
                    <label>Username</label>
                    <input type="text" name="username" required />
                    <label>Email</label>
                    <input type="email" name="email" required />
                    <label>Password</label>
                    <input type="password" name="password" required />
                    <button type="submit">Register</button>
                </form>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="hidden">
                <h2>Login</h2>
                <form id="loginFormElement">
                    <label>Email</label>
                    <input type="email" name="email" required />
                    <label>Password</label>
                    <input type="password" name="password" required />
                    <button type="submit">Login</button>
                </form>
            </div>
        </div>
    </div>

    <router-view :class="{ dark: store.dark }"></router-view>

    <style>
        /* Basit modal CSS */
        #authModal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        #authModal.hidden { display: none; }
        .modal-content {
            background: #1b1b1b;
            color: #fff;
            padding: 2rem;
            border-radius: 12px;
            width: 400px;
            position: relative;
        }
        #closeModal {
            position: absolute;
            top: 1rem; right: 1rem;
            cursor: pointer;
            font-size: 1.5rem;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        input {
            padding: 0.5rem;
            border-radius: 6px;
            border: none;
        }
        button {
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            background: #4caf50;
            color: #fff;
            cursor: pointer;
        }
    </style>

    <script>
        // Modal JS (main.js yerine buraya da yazabilirsin)
        const registerBtn = document.getElementById('registerBtn');
        const loginBtn = document.getElementById('loginBtn');
        const authModal = document.getElementById('authModal');
        const registerForm = document.getElementById('registerForm');
        const loginForm = document.getElementById('loginForm');
        const closeModal = document.getElementById('closeModal');

        registerBtn.addEventListener('click', () => {
            authModal.classList.remove('hidden');
            registerForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        });

        loginBtn.addEventListener('click', () => {
            authModal.classList.remove('hidden');
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
        });

        closeModal.addEventListener('click', () => {
            authModal.classList.add('hidden');
        });

        // Form submit eventleri
        document.getElementById('registerFormElement').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Register form submitted! (Backend eklenecek)');
            authModal.classList.add('hidden');
        });

        document.getElementById('loginFormElement').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Login form submitted! (Backend eklenecek)');
            authModal.classList.add('hidden');
        });
    </script>
</body>
</html>
