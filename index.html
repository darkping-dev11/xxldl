<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1024" />
<title>Your List Name</title>

<link rel="icon" href="/listt_icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@500;700&family=Poppins:wght@700&display=swap" rel="stylesheet" />

<link rel="stylesheet" type="text/css" href="/css/reset.css" />
<link rel="stylesheet" type="text/css" href="/css/typography.css" />
<link rel="stylesheet" type="text/css" href="/css/main.css" />
<link rel="stylesheet" type="text/css" href="/css/pages/list.css" />
<link rel="stylesheet" type="text/css" href="/css/pages/leaderboard.css" />
<link rel="stylesheet" type="text/css" href="/css/pages/roulette.css" />
<link rel="stylesheet" type="text/css" href="/css/components/nav.css" />
<link rel="stylesheet" type="text/css" href="/css/components/btn.css" />
<link rel="stylesheet" type="text/css" href="/css/components/tabs.css" />

<style>
/* Sol üst XXL DL font */
.logo h2 {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
}

/* 🌐 dropdown menü arka plan beyaz ve yazılar siyah */
.nav-dropdown .dropdown-content {
    display: none;
    position: absolute;
    right: 0;
    background-color: #fff !important;
    color: #000 !important;
    min-width: 140px;
    border-radius: 0.5rem;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    z-index: 100;
}
.nav-dropdown .dropdown-content a {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.5rem 1rem;
    text-decoration: none;
    color: #000;
    font-size: 0.9rem;
}
/* Örnek semboller: 🔗 yerine fontawesome veya simge olabilir */
.nav-dropdown .dropdown-content a::before {
    content: '🔗';
}

/* Hover */
.nav-dropdown .dropdown-content a:hover {
    background-color: rgba(0,0,0,0.05);
}
.nav-dropdown:hover .dropdown-content {
    display: block;
}

/* Level isimlerinin arkasındaki kutu kaldır */
.list__item, .level-name {
    background: none !important;
    color: #fff !important;
}

/* Leaderboard başlıklar ve alt çizgiler */
.leaderboard table th, .leaderboard table td {
    border-bottom: 1px solid rgba(255,255,255,0.2);
}
.leaderboard table th {
    border-right: 1px solid rgba(255,255,255,0.2);
    text-align: left;
    padding: 8px;
}
.leaderboard table th:last-child {
    border-right: none;
}
.leaderboard table td {
    border-right: 1px solid rgba(255,255,255,0.1);
    padding: 6px 8px;
}
.leaderboard table td:last-child {
    border-right: none;
}
</style>

<script src="https://unpkg.com/vue@3.2.31/dist/vue.global.js"></script>
<script src="https://unpkg.com/vue-router@4.0.14/dist/vue-router.global.prod.js"></script>
<script type="module" src="/js/main.js"></script>
</head>

<body id="app">
<header>
    <div class="logo">
        <h2>XXL DL</h2>
        <p>v1.0.0</p>
    </div>
    <nav class="nav">
        <router-link class="nav__tab" to="/">
            <span class="type-label-lg">List</span>
        </router-link>
        <router-link class="nav__tab" to="/leaderboard">
            <span class="type-label-lg">Leaderboard</span>
        </router-link>
        <router-link class="nav__tab" to="/roulette">
            <span class="type-label-lg">Roulette</span>
        </router-link>

        <div class="nav__actions">
            <!-- İnternet dropdown menü -->
            <div class="nav-dropdown">
                <button class="nav__icon dropdown-btn">🌐</button>
                <div class="dropdown-content">
                    <a href="https://discord.com" target="_blank">Discord</a>
                    <a href="https://youtube.com" target="_blank">YouTube</a>
                    <a href="https://twitter.com" target="_blank">Twitter</a>
                </div>
            </div>

            <a class="nav__cta type-label-lg" href="#" target="_blank">Submit Record</a>
        </div>
    </nav>
</header>

<router-view></router-view>
</body>
</html>
