<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1024" />
    <title>Your List Name</title>

    <link rel="icon" href="/list_icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@500;700&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" href="/css/reset.css" />
    <link rel="stylesheet" href="/css/typography.css" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/pages/list.css" />
    <link rel="stylesheet" href="/css/pages/leaderboard.css" />
    <link rel="stylesheet" href="/css/pages/roulette.css" />
    <link rel="stylesheet" href="/css/components/nav.css" />
    <link rel="stylesheet" href="/css/components/btn.css" />
    <link rel="stylesheet" href="/css/components/tabs.css" />

    <!-- 🔥 FULL RENKLİ ARKA PLAN -->
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff0080, #7928ca, #2afadf);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        #app {
            min-height: 100vh;
            background: transparent;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Beyaz arka planları iptal et */
        .container, .page, .content {
            background: transparent !important;
        }

        /* Header cam efekti */
        header {
            backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.4) !important;
        }
    </style>

    <script src="https://unpkg.com/vue@3.2.31/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4.0.14/dist/vue-router.global.prod.js"></script>
    <script type="module" src="/js/main.js"></script>
</head>

<body>
    <div id="app">
        <header :class="{ dark: store.dark }">
            <div class="logo">
                <h2>Örnek Liste</h2>
                <p>v1.0.0</p>
            </div>
            <nav class="nav">
                <router-link class="nav__tab" to="/">
                    <span class="type-label-lg">Liste</span>
                </router-link>
                <router-link class="nav__tab" to="/leaderboard">
                    <span class="type-label-lg">Liderlik Tablosu</span>
                </router-link>
                <router-link class="nav__tab" to="/roulette">
                    <span class="type-label-lg">Rulet</span>
                </router-link>
                <div class="nav__actions">
                    <button class="nav__icon" @click.prevent="store.toggleDark()">
                        <img :src="store.dark ? '/assets/light.svg' : '/assets/dark.svg'" />
                    </button>

                    <a class="nav__icon" href="#">
                        <img src="/assets/discord.svg" />
                    </a>

                    <a class="nav__cta type-label-lg" href="#" target="_blank">
                        Kaydı Gönder
                    </a>
                </div>
            </nav>
        </header>

        <router-view :class="{ dark: store.dark }"></router-view>
    </div>
</body>
</html>
