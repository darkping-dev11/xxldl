<!DOCTYPE html>

<head>

<meta name="viewport" content="width=1024" />

<link rel="stylesheet" href="/css/reset.css" />
<link rel="stylesheet" href="/css/typography.css" />
<link rel="stylesheet" href="/css/main.css" />
<link rel="stylesheet" href="/css/pages/list.css" />
<link rel="stylesheet" href="/css/pages/leaderboard.css" />

<link rel="stylesheet" href="/css/components/nav.css" />
<link rel="stylesheet" href="/css/components/btn.css" />
<link rel="stylesheet" href="/css/components/tabs.css" />

<style>

/* PEMBE GRADIENT ARKA PLAN */

html, body{
min-height:100%;
background:linear-gradient(135deg,#ff4da6,#ff66b3,#ff85c2,#ff4da6);
background-size:400% 400%;
animation:gradientMove 18s ease infinite;
background-attachment:fixed;
font-family:'Lexend Deca',sans-serif;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}


/* TÜM YAZILAR BEYAZ */

body,
h1,h2,h3,h4,h5,h6,
p,
span,
a,
td,
th,
button,
label{
color:#ffffff !important;
}

a{
color:#ffffff !important;
}


/* LİST KUTULARINI KALDIR */

li,
.list__item,
.record{
background:transparent !important;
border:none !important;
box-shadow:none !important;
}


/* HEADER */

header{
padding:20px;
}

.logo{
margin-bottom:10px;
border-bottom:2px solid rgba(255,255,255,0.3);
padding-bottom:10px;
}


/* NAVBAR */

.nav{
display:flex;
align-items:center;
gap:25px;
border-bottom:1px solid rgba(255,255,255,0.2);
padding-bottom:10px;
}

.nav__actions{
margin-left:auto;
display:flex;
align-items:center;
gap:20px;
}

.nav__cta{
text-decoration:none;
border-bottom:2px solid transparent;
transition:.3s;
}

.nav__cta:hover{
border-bottom:2px solid #fff;
}


/* DROPDOWN */

.nav-dropdown{
position:relative;
display:inline-block;
}

.dropdown-btn{
background:transparent;
border:none;
font-size:20px;
cursor:pointer;
color:white;
}


/* MENÜ ARKA PLANI BEYAZ */

.dropdown-content{
display:none;
position:absolute;
right:0;
background:white;
min-width:150px;
border-radius:8px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.dropdown-content a{
display:block;
padding:10px 15px;
color:black !important;
text-decoration:none;
}

.dropdown-content a:hover{
background:#f0f0f0;
}

.nav-dropdown:hover .dropdown-content{
display:block;
}

</style>

<script src="https://unpkg.com/vue@3.2.31/dist/vue.global.js"></script>
<script src="https://unpkg.com/vue-router@4.0.14/dist/vue-router.global.prod.js"></script>
<script type="module" src="/js/main.js"></script>

</head>

<body id="app">

<header>

<div class="logo">
<h2>XXL DL</h2>
<p>v1.0.0</p>
</div>

<nav class="nav">

<router-link class="nav__tab" to="/">
<span>List</span>
</router-link>

<router-link class="nav__tab" to="/leaderboard">
<span>Leaderboard</span>
</router-link>

<router-link class="nav__tab" to="/roulette">
<span>Roulette</span>
</router-link>

<div class="nav__actions">

<div class="nav-dropdown">

<button class="dropdown-btn">🌐</button>

<div class="dropdown-content">
<a href="https://discord.com" target="_blank">Discord</a>
<a href="https://youtube.com" target="_blank">YouTube</a>
<a href="https://twitter.com" target="_blank">Twitter</a>
</div>

</div>

<a class="nav__cta" href="#" target="_blank">
Submit Record
</a>

</div>

</nav>
</header>

<router-view></router-view>

</body>
</html>
